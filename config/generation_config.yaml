generation_model:
  provider: custom            # openai | anthropic | mistral | custom
  model_name: gpt-5.2         # overridden by MODEL_NAME env var if set
  api_key_env: API_KEY
  temperature: 0.7
  max_tokens: 1500

dataset:
  target_total: 2910
  mode: full_refresh          # full_refresh | incremental
  output_dir: data/final/
  seed: 42
  version: "1.0.0"
  enable_dedup: false         # set to true to enable cosine-similarity dedup (requires sentence-transformers)

domain_split:                 # Must sum to 1.0
  insurance: 0.25
  banking: 0.20
  investments_wealth: 0.15
  tax_retirement: 0.15
  regulatory_compliance: 0.10
  general_financial_literacy: 0.10
  financial_history_events: 0.05

dimension_split:              # Target counts per dimension
  hallucination: 950
  consistency: 380
  robustness: 1010
  safety: 570

difficulty_split:             # Must sum to 1.0
  easy: 0.20
  medium: 0.40
  hard: 0.40
